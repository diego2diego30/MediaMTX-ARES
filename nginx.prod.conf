map $http_x_forwarded_proto $real_scheme {
    ""      $scheme;
    default $http_x_forwarded_proto;
}

map $upstream_http_location $hls_rewritten_location {
    ""        "";
    ~^(.+)$   $real_scheme://$http_host/hls$1;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name ares-werx.com www.ares-werx.com;

    # Let's Encrypt ACME Challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name ares-werx.com www.ares-werx.com;

    ssl_certificate /etc/letsencrypt/live/ares-werx.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ares-werx.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    error_page 401 =302 /login.html;

    # Internal auth verification endpoint
    location = /auth/verify {
        internal;
        proxy_pass http://telemetry:8081;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
    }

    # Public Auth Login endpoint
    location = /auth/login {
        proxy_pass http://telemetry:8081;
    }

    # Public Landing Portal & Assets (for iMessage / Signal previews)
    location = / {
        root   /usr/share/nginx/html;
        try_files /index.html =404;
    }
    location = /index.html {
        root   /usr/share/nginx/html;
    }
    location = /login.html {
        root /usr/share/nginx/html;
    }
    location = /ARESLogo.png {
        root /usr/share/nginx/html;
    }

    # Serve static Web GUI & COP
    location / {
        auth_request /auth/verify;
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ $uri.html =404;
        add_header Cache-Control "no-cache";
    }

    # Proxy MediaMTX HLS
    location /hls/ {
        auth_request /auth/verify;
        proxy_pass             http://mediamtx:8888/;
        proxy_redirect         off;
        proxy_set_header       Host $http_host;
        proxy_set_header       X-Forwarded-Proto https;
        proxy_set_header       X-Real-IP $remote_addr;
        proxy_set_header       Cookie $http_cookie;
        proxy_hide_header      Location;
        proxy_hide_header      Access-Control-Allow-Origin;
        proxy_hide_header      Access-Control-Allow-Credentials;
        add_header             Location $hls_rewritten_location always;
        add_header             Access-Control-Allow-Origin $http_origin always;
        add_header             Access-Control-Allow-Credentials true always;
        add_header             Cache-Control "no-cache";
    }

    # Proxy MediaMTX Admin API
    location /api/ {
        auth_request /auth/verify;
        proxy_pass         http://mediamtx:9997/;
        proxy_redirect     ~^/(.*)$ https://$http_host/api/$1;
        proxy_set_header   Host $http_host;
        proxy_hide_header  Access-Control-Allow-Origin;
        proxy_hide_header  Access-Control-Allow-Credentials;
        add_header         Access-Control-Allow-Origin $http_origin always;
        add_header         Access-Control-Allow-Credentials true always;
        add_header         Access-Control-Allow-Methods "GET, POST, OPTIONS";
        add_header         Access-Control-Allow-Headers "Content-Type";
    }

    # Proxy UAS Telemetry Bridge WebSocket
    location /ws/ {
        auth_request /auth/verify;
        proxy_pass         http://telemetry:8081/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host $http_host;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Proxy MBTiles Tile Server
    location /tiles/ {
        auth_request /auth/verify;
        proxy_pass         http://telemetry:8081/tiles/;
        add_header         Access-Control-Allow-Origin *;
        add_header         Cache-Control "public, max-age=86400";
    }
}

server {
    listen 8444 ssl http2;
    server_name ares-werx.com www.ares-werx.com;

    ssl_certificate /etc/letsencrypt/live/ares-werx.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ares-werx.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass https://5.161.45.97:8443;
        proxy_ssl_verify off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_addrs;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
