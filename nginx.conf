
# Use X-Forwarded-Proto sent by Cloudflare (https) instead of the internal HTTP scheme.
# Falls back to $scheme for direct local access.
map $http_x_forwarded_proto $real_scheme {
    ""      $scheme;
    default $http_x_forwarded_proto;
}

# Only inject a Location header when MediaMTX actually sent one (302 cookie-check).
# Empty upstream Location → empty map value → no Location added on 200 responses.
map $upstream_http_location $hls_rewritten_location {
    ""        "";
    ~^(.+)$   $real_scheme://$http_host/hls$1;
}

# WebSocket connection upgrade map
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name localhost;

    error_page 401 =302 /login;

    # Redirect explicit .html requests to clean URLs
    if ($request_uri ~* "^/([^?]+)\.html(\?.*)?$") {
        return 301 /$1$2;
    }

    # Internal auth verification endpoint
    location = /auth/verify {
        internal;
        proxy_pass http://telemetry:8081;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
    }

    # Public Auth Login endpoint
    location = /auth/login {
        proxy_pass http://telemetry:8081;
    }

    # Public Landing Portal & Assets (for iMessage / Signal previews)
    location = / {
        root   /usr/share/nginx/html;
        try_files /index.html =404;
    }
    location = /index.html {
        root   /usr/share/nginx/html;
    }
    location ~ ^/login(\.html)?$ {
        root /usr/share/nginx/html;
        try_files /login.html =404;
    }
    location = /ARESLogo.png {
        root /usr/share/nginx/html;
    }

    # Serve the GUI
    location / {
        auth_request /auth/verify;
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ $uri.html =404;
        add_header Cache-Control "no-cache";
    }

    # Proxy MediaMTX HLS
    # MediaMTX does a cookie-check 302 with a root-relative Location (/path?cookieCheck=1).
    # We intercept it and rebuild Location using the real public scheme+host so remote
    # clients behind Cloudflare (HTTPS) get a proper https:// redirect, not http://.
    location /hls/ {
        auth_request /auth/verify;
        proxy_pass             http://host.docker.internal:8888/;
        proxy_redirect         off;
        proxy_set_header       Host $http_host;
        proxy_set_header       X-Forwarded-Proto $real_scheme;
        proxy_set_header       X-Real-IP $remote_addr;
        proxy_set_header       Cookie $http_cookie;
        proxy_hide_header      Location;
        proxy_hide_header      Access-Control-Allow-Origin;
        proxy_hide_header      Access-Control-Allow-Credentials;
        add_header             Location $hls_rewritten_location always;
        add_header             Access-Control-Allow-Origin $http_origin always;
        add_header             Access-Control-Allow-Credentials true always;
        add_header             Cache-Control "no-cache";
    }

    location /api/record {
        proxy_pass http://telemetry:8081;
    }
    location /api/upload_map {
        proxy_pass http://telemetry:8081;
        client_max_body_size 1024M;
    }
    location /api/recordings {
        proxy_pass http://telemetry:8081;
    }

    # Proxy MediaMTX Admin API
    location /api/ {
        auth_request /auth/verify;
        proxy_pass         http://host.docker.internal:9997/;
        proxy_redirect     ~^/(.*)$ $real_scheme://$http_host/api/$1;
        proxy_set_header   Host $http_host;
        proxy_hide_header  Access-Control-Allow-Origin;
        proxy_hide_header  Access-Control-Allow-Credentials;
        add_header         Access-Control-Allow-Origin $http_origin always;
        add_header         Access-Control-Allow-Credentials true always;
        add_header         Access-Control-Allow-Methods "GET, POST, OPTIONS";
        add_header         Access-Control-Allow-Headers "Content-Type";
    }

    # Proxy UAS Telemetry Bridge WebSocket
    location /ws/ {
        auth_request /auth/verify;
        proxy_pass         http://telemetry:8081/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host $http_host;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Proxy MBTiles Tile Server
    location /tiles/ {
        auth_request /auth/verify;
        proxy_pass         http://telemetry:8081/tiles/;
        add_header         Access-Control-Allow-Origin *;
        add_header         Cache-Control "public, max-age=86400";
    }
}

server {
    listen 8444 ssl http2;
    server_name ares-werx.com www.ares-werx.com;

    ssl_certificate /etc/letsencrypt/live/ares-werx.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ares-werx.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    error_page 401 =302 https://ares-werx.com/login;

    # Internal auth verification endpoint
    location = /auth/verify {
        internal;
        proxy_pass http://telemetry:8081;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
    }

    location / {
        auth_request /auth/verify;
        proxy_pass https://takserver:8443;
        proxy_ssl_verify off;
        proxy_ssl_certificate /etc/nginx/tak-cert/tak-client.pem;
        proxy_ssl_certificate_key /etc/nginx/tak-cert/tak-client.key;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port 8444;

        # Rewrite any redirects from TAK Server so they stay on port 8444
        proxy_redirect https://takserver:8443/ https://$http_host/;
        proxy_redirect https://$host/ https://$http_host/;
        proxy_redirect http://$host/ https://$http_host/;

        # Strip iframe security restrictions set by TAK Server
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
    }
}
