<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Open Graph / iMessage / Signal Link Preview Banner -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://ares-werx.com/" />
  <meta property="og:title" content="ARES-WERX Tactical Portal" />
  <meta property="og:description" content="Real-time Common Operating Picture, MediaMTX Video Matrix, and TAK Telemetry Platform." />
  <meta property="og:image" content="https://ares-werx.com/ARESLogo.png" />
  <meta property="og:image:secure_url" content="https://ares-werx.com/ARESLogo.png" />
  <meta property="og:image:type" content="image/png" />
  <meta property="og:image:width" content="1024" />
  <meta property="og:image:height" content="1024" />
  <meta property="og:site_name" content="ARES-WERX" />

  <!-- Twitter / iMessage Cards -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:domain" content="ares-werx.com" />
  <meta name="twitter:url" content="https://ares-werx.com/" />
  <meta name="twitter:title" content="ARES-WERX Tactical Portal" />
  <meta name="twitter:description" content="Real-time Common Operating Picture, MediaMTX Video Matrix, and TAK Telemetry Platform." />
  <meta name="twitter:image" content="https://ares-werx.com/ARESLogo.png" />

  <link rel="apple-touch-icon" href="https://ares-werx.com/ARESLogo.png">
  <link rel="icon" type="image/png" href="https://ares-werx.com/ARESLogo.png">
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@900&family=IBM+Plex+Mono:wght@400;500;600;700&family=Oswald:wght@600;700&display=swap"
    rel="stylesheet">
  <title>ARES-WERX Portal</title>
  <style>
    :root {
      --black: #000000;
      --bg-deep: #020a04;
      --bg-panel: #040e06;
      --bg-card: #071209;
      --green-bright: #00ff5e;
      --green-mid: #00cc4a;
      --green-dim: #007a2b;
      --green-dark: #003d14;
      --green-glow: rgba(0, 255, 94, 0.22);
      --border: rgba(0, 200, 70, 0.22);
      --font-system: 'Helvetica', 'Arial', sans-serif;
      --font-mono: 'IBM Plex Mono', 'Courier New', monospace;
    }

    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--black);
      color: #fff;
      font-family: var(--font-system);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 255, 94, .035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 94, .035) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    .portal-container {
      position: relative;
      z-index: 10;
      background: var(--bg-deep);
      border: 1px solid var(--green-dim);
      box-shadow: 0 0 32px var(--green-glow);
      padding: 50px 60px;
      width: 100%;
      max-width: 500px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    .portal-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--green-bright);
    }

    .logo {
      height: 140px;
      margin-bottom: 10px;
    }

    .header-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .title {
      font-family: var(--font-system);
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 8px;
      padding-left: 8px;
      width: 100%;
      text-transform: uppercase;
      color: var(--green-mid);
      text-align: center;
    }

    .subtitle {
      font-family: var(--font-mono);
      font-size: 16px;
      color: var(--green-dim);
      letter-spacing: 2px;
      padding-left: 2px;
      width: 100%;
      text-transform: uppercase;
      text-align: center;
    }

    .options-grid {
      display: flex;
      flex-direction: column;
      width: 100%;
      gap: 16px;
    }

    .portal-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      background: rgba(0, 255, 94, 0.05);
      border: 1px solid var(--green-dim);
      color: var(--green-bright);
      padding: 24px;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      gap: 8px;
    }

    .portal-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(0, 255, 94, 0.1), transparent);
      transition: left 0.5s ease;
    }

    .portal-btn:hover {
      background: rgba(0, 255, 94, 0.15);
      border-color: var(--green-mid);
      box-shadow: 0 0 20px var(--green-glow);
      transform: translateY(-2px);
    }

    .portal-btn:hover::before {
      left: 100%;
    }

    .btn-title {
      font-family: var(--font-system);
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 4px;
      padding-left: 4px;
      width: 100%;
      text-transform: uppercase;
      text-align: center;
    }

    .btn-desc {
      font-family: var(--font-mono);
      font-size: 11px;
      color: rgba(255, 255, 255, 0.7);
      letter-spacing: 1px;
      padding-left: 1px;
      width: 100%;
      text-align: center;
    }

    .status-indicator {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 10px;
    }

    .dot {
      width: 8px;
      height: 8px;
      background-color: var(--green-bright);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--green-bright);
      animation: pulse 2s infinite;
    }

    .status-text {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 600;
      color: var(--green-dim);
      letter-spacing: 2px;
      padding-left: 2px;
      text-transform: uppercase;
    }

    @keyframes pulse {
      0% {
        opacity: 1;
        box-shadow: 0 0 8px var(--green-bright);
      }

      50% {
        opacity: 0.4;
        box-shadow: 0 0 2px var(--green-bright);
      }

      100% {
        opacity: 1;
        box-shadow: 0 0 8px var(--green-bright);
      }
    }
  </style>
</head>

<body>

  <div class="portal-container">
    <div class="header-group">
      <img src="ARESLogo.png" alt="ARES Logo" class="logo">
      <div class="title">ARES-WERX PORTAL</div>
      <div class="subtitle">Select Operational Environment</div>
    </div>

    <div class="options-grid">
      <a href="mtx.html" class="portal-btn">
        <div class="btn-title">Media-MTX Hub</div>
        <div class="btn-desc">Video Management Server & Stream Dashboard</div>
      </a>

      <a href="cop.html" class="portal-btn">
        <div class="btn-title">Ares COP</div>
        <div class="btn-desc">Tactical Mission Planning & Common Operating Picture</div>
      </a>
    </div>

    <div class="status-indicator">
      <div class="dot"></div>
      <div class="status-text">SYSTEM ONLINE</div>
    </div>
  </div>

</body>

</html>
