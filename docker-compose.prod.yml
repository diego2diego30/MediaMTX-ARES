version: '3.8'

services:
  mediamtx:
    image: bluenviron/mediamtx:latest-ffmpeg
    container_name: mediamtx
    restart: unless-stopped
    ports:
      - "8554:8554"       # RTSP TCP
      - "8554:8554/udp"   # RTSP UDP
      - "8000:8000/udp"   # RTP UDP
      - "8001:8001/udp"   # RTCP UDP
      - "1935:1935"       # RTMP TCP
      - "8888:8888"       # HLS TCP
      - "8889:8889"       # WebRTC TCP
      - "8890:8890/udp"   # SRT UDP
      - "9997:9997"       # Admin API
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
      - ./DayFlight.ts:/DayFlight.ts:ro

  telemetry:
    build:
      context: .
      dockerfile: Dockerfile.telemetry
    container_name: telemetry-bridge
    restart: unless-stopped
    ports:
      - "8081:8081"
      - "9998:9998/udp"   # KLV UDP ingest
    environment:
      - MTX_API_URL=http://mediamtx:9997
      - MTX_RTSP_URL=rtsp://mediamtx:8554
      - TAK_SERVER_HOST=tak-server
      - TAK_SERVER_PORT=8087
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - mediamtx
      - tak-server

  gui:
    image: nginx:alpine
    container_name: mediamtx-gui
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./:/usr/share/nginx/html:ro
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - mediamtx
      - telemetry

  tak-server:
    image: takserver/takserver:latest
    container_name: tak-server
    restart: unless-stopped
    ports:
      - "8087:8087"       # Plain CoT TCP
      - "8089:8089"       # TLS CoT (ATAK/WinTAK)
      - "8443:8443"       # TAK Web Admin UI
    environment:
      - STATE=production
    volumes:
      - ./tak_data/certs:/opt/tak/certs
      - ./tak_data/data:/opt/tak/data
